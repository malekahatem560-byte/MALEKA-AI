
<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>MALEKA Cinematic Studio</title><style>
body{
background:#05070d;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#131722;
padding:20px;
margin-bottom:15px;
border-radius:14px;
}

.value{
font-size:24px;
font-weight:bold;
color:#4ade80;
}

.agent{
display:inline-block;
padding:8px 12px;
margin:4px;
background:#1e293b;
border-radius:8px;
}
</style></head><body><h1>🎬 MALEKA Cinematic Studio</h1><div class="card">
<div>Kernel Status</div>
<div id="kernel" class="value">Loading...</div>
</div><div class="card">
<div>Runtime</div>
<div id="runtime" class="value">Loading...</div>
</div><div class="card">
<div>Agents</div>
<div id="agents"></div>
</div><script>

async function loadKernel(){
const r = await fetch('/kernel');
const d = await r.json();

document.getElementById('kernel').innerText =
d.status + ' | PID ' + d.pid;
}

async function loadRuntime(){
const r = await fetch('/runtime');
const d = await r.json();

document.getElementById('runtime').innerText =
d.status;
}

async function loadAgents(){
const r = await fetch('/agents');
const d = await r.json();

let html='';

if(d.agents){
for(const a of d.agents){
html += '<span class="agent">'+a+'</span>';
}
}

document.getElementById('agents').innerHTML = html;
}

async function refresh(){
await loadKernel();
await loadRuntime();
await loadAgents();
}

refresh();
setInterval(refresh,3000);

</script></body>
</html>
